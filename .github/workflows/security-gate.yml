name: Security Gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: TruffleHog
        continue-on-error: true
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  sast-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install bandit semgrep pip-audit safety
          mkdir -p ../reports
      - name: Bandit
        continue-on-error: true
        run: bandit -r app -f json -o ../reports/bandit-baseline.json --severity-level medium || echo "Bandit found issues (report saved)"
      - name: Semgrep
        continue-on-error: true
        run: semgrep --config=p/python --config=p/jwt --config=p/secrets --json -o ../reports/semgrep-baseline.json app || echo "Semgrep found issues (report saved)"
      - name: Dependency audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt -f json -o ../reports/pip-audit-baseline.json || echo "pip-audit found vulnerabilities"
          safety check --json > ../reports/safety-baseline.json || true

  sast-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - name: Install dependencies
        run: bun install
      - name: Prepare reports directory
        run: mkdir -p ../reports
      - name: npm audit
        run: npm audit --audit-level=high --json > ../reports/npm-audit-baseline.json || true

  route-manifest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate route manifest
        continue-on-error: true
        run: python scripts/generate_route_manifest.py || echo "Route manifest generation skipped"
      - name: Validate manifest has no gaps
        if: always()
        continue-on-error: true
        run: |
          python - <<'PY' || echo "Manifest validation skipped"
          import json
          from pathlib import Path
          manifest_path = Path("../docs/route-manifest.json")
          if not manifest_path.exists():
              print("No route-manifest.json found — skipping validation")
              exit(0)
          manifest = json.loads(manifest_path.read_text())
          gaps = manifest.get("summary", {}).get("gaps_found", 0)
          if gaps:
              print(f"route manifest contains {gaps} gaps")
          PY

  migration-safety:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check destructive migrations
        continue-on-error: true
        run: python scripts/check_destructive_migrations.py || echo "Migration safety check skipped"
