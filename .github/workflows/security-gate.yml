name: Security Gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  sast-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: ci-test-encryption-key-not-for-production-32ch
      POSTGRES_PASSWORD: test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      TRADING_MODE: PAPER
      TELEGRAM_BOT_TOKEN: ""
      MT5_LOGIN: "0"
      MT5_PASSWORD: ""
      MT5_SERVER: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install bandit semgrep pip-audit safety
          mkdir -p ../reports
      - name: Bandit
        run: bandit -r app -f json -o ../reports/bandit-baseline.json --severity-level medium
      - name: Semgrep
        run: semgrep --config=p/python --config=p/jwt --config=p/secrets --json -o ../reports/semgrep-baseline.json app
      - name: Dependency audit
        run: |
          pip-audit -r requirements.txt -f json -o ../reports/pip-audit-baseline.json
          safety check --json > ../reports/safety-baseline.json || true

  sast-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - name: Install dependencies
        run: bun install
      - name: Prepare reports directory
        run: mkdir -p ../reports
      - name: npm audit
        run: npm audit --audit-level=high --json > ../reports/npm-audit-baseline.json || true

  route-manifest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: ci-test-encryption-key-not-for-production-32ch
      POSTGRES_PASSWORD: test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      TRADING_MODE: PAPER
      TELEGRAM_BOT_TOKEN: ""
      MT5_LOGIN: "0"
      MT5_PASSWORD: ""
      MT5_SERVER: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate route manifest
        run: python scripts/generate_route_manifest.py
      - name: Validate manifest has no gaps
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("../docs/route-manifest.json").read_text())
          gaps = manifest.get("summary", {}).get("gaps_found", 0)
          if gaps:
              raise SystemExit(f"route manifest contains {gaps} gaps")
          PY

  migration-safety:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: ci-test-encryption-key-not-for-production-32ch
      POSTGRES_PASSWORD: test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      TRADING_MODE: PAPER
      TELEGRAM_BOT_TOKEN: ""
      MT5_LOGIN: "0"
      MT5_PASSWORD: ""
      MT5_SERVER: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check destructive migrations
        run: python scripts/check_destructive_migrations.py
