name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest tests -q

      - name: Export OpenAPI spec
        run: python scripts/export_openapi.py --output openapi.json

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-openapi
          path: backend/openapi.json

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install frontend dependencies
        run: bun install

      - name: Run frontend lint
        run: bun run lint

      - name: Run frontend tests
        run: bun run test

      - name: Run frontend build
        run: bun run build

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run frontend browser E2E
        run: bun run test:e2e

      - name: Run Storybook build
        run: bun run build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-storybook
          path: frontend/storybook-static

      - name: Upload Playwright artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results

  ops:
    name: Ops Script Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          bash -n backend/scripts/backup_database.sh
          bash -n backend/scripts/restore_database.sh
          bash -n backend/scripts/smoke_tests.sh
          bash -n deploy/scripts/harden-vps.sh
          bash -n deploy/scripts/deploy.sh
          bash -n deploy/scripts/rollback.sh
          bash -n deploy/scripts/dr-rebuild.sh

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate production Docker Compose
        run: |
          cp .env.production.template .env.production
          mkdir -p secrets
          printf '%s' 'AGE-SECRET-KEY-placeholder' > secrets/backup_private_key.txt
          printf '%s' 'placeholder-token' > secrets/alertmanager_webhook_token.txt
          BACKEND_DIGEST=sha256-test FRONTEND_DIGEST=sha256-test \
            docker compose -f docker-compose.prod.yml config > /dev/null
