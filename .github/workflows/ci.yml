name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security_scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest tests -q

      - name: Export OpenAPI spec
        run: python scripts/export_openapi.py --output openapi.json

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-openapi
          path: backend/openapi.json

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install frontend dependencies
        run: bun install

      - name: Run frontend lint
        run: bun run lint

      - name: Run frontend tests
        run: bun run test

      - name: Run frontend build
        run: bun run build

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright dependencies (if cached)
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run frontend browser E2E
        run: bun run test:e2e

      - name: Run Storybook build
        run: bun run build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-storybook
          path: frontend/storybook-static

      - name: Upload Playwright artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results

  ops:
    name: Ops Script Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          bash -n scripts/ops/backup_database.sh
          bash -n scripts/ops/restore_database.sh
          bash -n scripts/tests/smoke_tests.sh
          bash -n scripts/deployment/harden-vps.sh
          bash -n scripts/deployment/deploy.sh
          bash -n scripts/deployment/rollback.sh
          bash -n scripts/deployment/dr-rebuild.sh

      - name: Validate Docker Compose
        run: TAG=${{ github.sha }} docker compose -f docker-compose.yml config > /dev/null

      - name: Validate production Docker Compose
        run: |
          cp .env.production.template .env.production
          mkdir -p secrets
          printf '%s' 'AGE-SECRET-KEY-placeholder' > secrets/backup_private_key.txt
          TAG=${{ github.sha }} docker compose -f config/docker-compose.production.yml --env-file .env.production config > /dev/null
          BACKEND_DIGEST=sha256-test FRONTEND_DIGEST=sha256-test \
            docker compose -f docker-compose.prod.yml config > /dev/null

  deploy:
    name: Build and Push Images
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/graxia-backend:${{ github.sha }}

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository }}/graxia-frontend:${{ github.sha }}
