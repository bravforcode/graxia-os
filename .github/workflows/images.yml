name: Images

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  build-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Derive image name
        id: image
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "ref=ghcr.io/${repo}/${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with SBOM and provenance
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.image.outputs.ref }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
          sbom: true
          provenance: true

      - name: Trivy image scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: false

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif

      - name: Persist digest metadata
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ matrix.name }}=${{ steps.build.outputs.digest }}" > ${{ matrix.name }}-digest.env

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-digest
          path: ${{ matrix.name }}-digest.env
