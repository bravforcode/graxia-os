# ═══════════════════════════════════════════════════════════════════════════════
# Quant OS — CI/CD Pipeline
# Continuous Integration & Deployment
# ═══════════════════════════════════════════════════════════════════════════════

name: Quant OS CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'graxia/packages/quant_os/**'
      - 'requirements.quant.txt'
      - 'Dockerfile.quant'
      - 'docker-compose.quant.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'graxia/packages/quant_os/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/quant-os

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # Test Job
  # ═══════════════════════════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quant_os_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.quant.txt
      
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/quant_os_test
          REDIS_URL: redis://localhost:6379/0
          TRADING_MODE: PAPER
        run: |
          python -m pytest graxia/packages/quant_os/tests/ -v --tb=short --cov=graxia.packages.quant_os --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: quant-os-coverage

  # ═══════════════════════════════════════════════════════════════════════════════
  # Security Scan
  # ═══════════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Bandit security scan
        uses: PyCQA/bandit@main
        with:
          args: "-r graxia/packages/quant_os/ -f json -o bandit-report.json || true"
      
      - name: Run Safety check
        run: |
          pip install safety
          safety check -r requirements.quant.txt

  # ═══════════════════════════════════════════════════════════════════════════════
  # Build & Push Docker Image
  # ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.quant
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ═══════════════════════════════════════════════════════════════════════════════
  # Deploy to Staging
  # ═══════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Deploy to staging server
        run: |
          echo "Deploying to staging..."
          # Add your staging deployment commands here
          # ssh user@staging-server "cd /opt/quant-os && docker-compose pull && docker-compose up -d"

  # ═══════════════════════════════════════════════════════════════════════════════
  # Deploy to Production
  # ═══════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to production server
        run: |
          echo "Deploying to production..."
          # Add your production deployment commands here
          # ssh user@production-server "cd /opt/quant-os && docker-compose pull && docker-compose up -d"
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'Quant OS deployed to production'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
