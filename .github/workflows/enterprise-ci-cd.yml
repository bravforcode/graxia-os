name: Enterprise CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip test execution (emergency only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: enterprise-ci-cd-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  BUN_VERSION: "1.3.6"
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  SECRET_KEY: ci-test-secret-key-not-for-production
  ENCRYPTION_KEY: ci-test-encryption-key-not-for-production-32ch
  POSTGRES_PASSWORD: test
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
  REDIS_URL: redis://localhost:6379/0
  TRADING_MODE: PAPER
  TELEGRAM_BOT_TOKEN: ""
  MT5_LOGIN: "0"
  MT5_PASSWORD: ""
  MT5_SERVER: ""

jobs:
  # ============================================================================
  # PHASE 1: CODE QUALITY & SECURITY SCANNING
  # ============================================================================
  
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          pip install ruff mypy bandit safety

      - name: Run Ruff (Python linting)
        working-directory: backend
        run: |
          ruff check app/ --output-format=github || true
          ruff format --check app/ || true

      - name: Run MyPy (Type checking)
        working-directory: backend
        run: |
          mypy app/ --ignore-missing-imports --pretty || true

      - name: Run Bandit (Security scan)
        working-directory: backend
        run: |
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -ll || true

      - name: Check dependencies for known vulnerabilities
        working-directory: backend
        run: |
          safety check --json --output safety-report.json || true
          safety check || true

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            backend/bandit-report.json
            backend/safety-report.json

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret detection (GitLeaks)
        uses: zricethezav/gitleaks-action@v2
        continue-on-error: true
        with:
          config-path: .github/workflows/.gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns (excluding tests and docs)
          ! grep -r "sk_live_" . --include="*.py" --include="*.ts" --include="*.js" --exclude-dir=tests --exclude-dir=node_modules 2>/dev/null || exit 1
          ! grep -r "AKIA" . --include="*.py" --include="*.ts" --exclude-dir=tests --exclude-dir=node_modules 2>/dev/null || exit 1
          ! grep -r "private_key" . --include="*.py" --include="*.ts" --exclude-dir=tests --exclude-dir=node_modules --exclude-dir=docs --exclude="*test*" --exclude="*.md" 2>/dev/null || exit 1

  # ============================================================================
  # PHASE 2: TESTING (PARALLEL EXECUTION)
  # ============================================================================

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: ${{ !inputs.skip_tests }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt || pip install fastapi uvicorn httpx pydantic sqlalchemy aiosqlite redis celery alembic passlib python-jose python-multipart stripe
          pip install pytest pytest-asyncio pytest-cov pytest-xdist

      - name: Run unit tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          TESTING: "true"
        run: |
          python -m pytest tests/unit -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=80 \
            -n auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: unittests
          name: unit-tests-coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: backend/htmlcov/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: ${{ !inputs.skip_tests }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          TESTING: "true"
        run: |
          python -m pytest tests/integration -v --tb=short

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: ${{ !inputs.skip_tests }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run security tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          TESTING: "true"
        run: |
          python -m pytest tests/security -v --tb=short

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Install Playwright
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Run E2E tests
        working-directory: frontend
        run: bun run test:e2e || echo "E2E tests not configured yet"

  # ============================================================================
  # PHASE 3: BUILD & PACKAGE
  # ============================================================================

  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================================================
  # PHASE 4: DEPLOYMENT
  # ============================================================================

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend, e2e-tests]
    if: github.ref == 'refs/heads/develop' || inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.graxia-api.fly.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (Staging)
        working-directory: backend
        run: |
          flyctl deploy --config fly.staging.toml --app graxia-api-staging --image ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run database migrations
        working-directory: backend
        run: |
          flyctl ssh console --command "python -m alembic upgrade head"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 30
          curl -sf https://staging.graxia-api.fly.dev/health || exit 1

      - name: Notify on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "✅ Staging deployment successful: ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.ref == 'refs/heads/main' || (inputs.environment == 'production' && github.ref == 'refs/heads/main')
    environment:
      name: production
      url: https://graxia-api.fly.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}

      - name: Deploy to Fly.io (Production)
        working-directory: backend
        run: |
          flyctl deploy --app graxia-api --strategy rolling --wait-timeout=600
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run database migrations
        working-directory: backend
        run: |
          flyctl ssh console --command "python -m alembic upgrade head"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 30
          curl -sf https://graxia-api.fly.dev/health || exit 1
          curl -sf https://graxia-api.fly.dev/system/stats || true

      - name: Notify on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "🚀 Production deployment successful: ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "❌ Production deployment FAILED: ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================================================
  # PHASE 5: POST-DEPLOYMENT VERIFICATION
  # ============================================================================

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          # Test critical endpoints
          curl -sf https://graxia-api.fly.dev/health
          curl -sf https://graxia-api.fly.dev/docs
          
          # Test API endpoints (if authenticated)
          # These would need proper auth tokens
          echo "Smoke tests completed"

  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load/k6-smoke-test.js
          flags: --env ENV=production
        continue-on-error: true

  # ============================================================================
  # NOTIFICATIONS
  # ============================================================================

  notify-completion:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-tests]
    if: always()

    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        continue-on-error: true
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()
