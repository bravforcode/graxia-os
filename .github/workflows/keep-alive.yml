# Graxia OS - Keep Fly.io Alive
# Pings the API every 5 minutes to prevent cold start
# Note: Fly.io free tier doesn't sleep, but this ensures health

name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Health Check
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.GRAXIA_API_URL }}/health")
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ API is healthy (HTTP 200)"
          else
            echo "⚠️ API returned HTTP $RESPONSE"
            exit 1
          fi
        
      - name: Log status
        if: always()
        run: echo "Health check completed at $(date -u)"
