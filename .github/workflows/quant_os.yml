name: quant_os CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

env:
  PYTHON_VERSION: "3.11"
  PACKAGE_PATH: graxia/packages/quant_os

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Test keys/secrets available to the test suite.
      # Add additional secrets here as needed.
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
      MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
      MT5_SERVER: ${{ secrets.MT5_SERVER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            ${{ env.PACKAGE_PATH }}/pyproject.toml
            ${{ env.PACKAGE_PATH }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.PACKAGE_PATH }}/requirements.txt
          pip install -e ${{ env.PACKAGE_PATH }}/

      - name: Run test suite
        run: python -m pytest ${{ env.PACKAGE_PATH }}/tests/ -v --tb=short -q

      - name: Run chaos test suite
        run: python -m pytest ${{ env.PACKAGE_PATH }}/tests/chaos/ -v --tb=short -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            ${{ env.PACKAGE_PATH }}/pyproject.toml
            ${{ env.PACKAGE_PATH }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.PACKAGE_PATH }}/requirements.txt
          pip install -e ${{ env.PACKAGE_PATH }}/

      - name: Run linter
        run: python -m ruff check ${{ env.PACKAGE_PATH }}/ --statistics

  typecheck:
    runs-on: ubuntu-latest
    # Allow this job to fail while mypy strictness is being tuned.
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            ${{ env.PACKAGE_PATH }}/pyproject.toml
            ${{ env.PACKAGE_PATH }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.PACKAGE_PATH }}/requirements.txt
          pip install -e ${{ env.PACKAGE_PATH }}/

      - name: Run type checker
        run: python -m mypy ${{ env.PACKAGE_PATH }}/ --ignore-missing-imports
