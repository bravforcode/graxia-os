name: Deploy to Hetzner CPX11

on:
  push:
    branches: [main, production]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Frontend
        working-directory: frontend
        run: |
          bun install
          bun run build

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Hetzner CPX11
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HEZTNER_HOST }}
          username: ${{ secrets.HEZTNER_USER }}
          key: ${{ secrets.HEZTNER_SSH_KEY }}
          script: |
            set -e
            cd ~/graxia-os
            
            # Pull latest images
            docker compose -f docker-compose.cpx11.yml pull backend
            
            # Update env if needed
            git pull origin main || true
            
            # Rolling restart - zero downtime
            docker compose -f docker-compose.cpx11.yml up -d --no-deps --build backend
            
            # Verify health
            sleep 10
            curl -sf http://localhost:8000/health || {
              echo "Health check failed - rolling back..."
              docker compose -f docker-compose.cpx11.yml restart backend
              exit 1
            }
            
            # Cleanup
            docker system prune -af --volumes 2>/dev/null || true
            echo "Deployment successful!"
