route:
  receiver: telegram
  group_by: ["alertname", "severity", "environment"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: telegram
    webhook_configs:
      - url: http://backend:8000/api/v1/integrations/alerts/telegram
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /etc/alertmanager/secrets/webhook_token

inhibit_rules:
  - source_match:
      alertname: APIDown
    target_match_re:
      alertname: HighLatency|HighErrorRate|WorkerDown
    equal: ["environment"]
  - source_match:
      alertname: PostgresDown
    target_match_re:
      alertname: BackupStale|RestoreDrillOverdue
    equal: ["environment"]
