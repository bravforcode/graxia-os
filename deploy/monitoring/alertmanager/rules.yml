groups:
  - name: critical
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"
          
      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "Database has been down for more than 1 minute"
          
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute"
          
      - alert: WorkerDown
        expr: celery_workers_online == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No Celery workers online"
          description: "All Celery workers have been offline for more than 5 minutes"
          
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend API is down"
          description: "Backend has been down for more than 2 minutes"
          
  - name: warning
    rules:
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, http_request_duration_seconds) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s over the last 10 minutes"
          
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 1e9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Process is using {{ $value | humanize }}B of memory"
          
      - alert: CostThresholdExceeded
        expr: daily_llm_cost_usd > 2.0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Daily LLM cost threshold exceeded"
          description: "Daily LLM cost is ${{ $value }}, exceeding the $2.00 threshold"
          
      - alert: HighQueueDepth
        expr: celery_queue_depth > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High Celery queue depth"
          description: "Queue {{ $labels.queue }} has {{ $value }} tasks pending"
          
      - alert: HighDatabaseConnections
        expr: pg_stat_database_numbackends > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High number of database connections"
          description: "Database has {{ $value }} active connections"
          
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space running low"
          description: "Only {{ $value | humanizePercentage }} disk space remaining on {{ $labels.mountpoint }}"
          
  - name: performance
    rules:
      - alert: SlowDatabaseQueries
        expr: rate(pg_stat_statements_mean_exec_time[5m]) > 1000
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Slow database queries detected"
          description: "Average query execution time is {{ $value }}ms"
          
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"
          
      - alert: HighRequestRate
        expr: rate(http_requests_total[5m]) > 100
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "High request rate"
          description: "Receiving {{ $value }} requests per second"
