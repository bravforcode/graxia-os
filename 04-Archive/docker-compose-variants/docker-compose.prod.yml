name: personal-os-prod

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  grafana_data:
  loki_data:
  prometheus_data:
  backup_data:

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    networks: [internal, public]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./logs/caddy:/var/log/caddy
      - caddy_data:/data
      - caddy_config:/config
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  frontend:
    # Image is built and pushed by CI (GitHub Actions). Use the tag set in .env.production.
    # For local prod test: docker compose -f docker-compose.prod.yml build frontend
    image: ${FRONTEND_IMAGE:-personal-os-frontend}:${IMAGE_TAG:-prod}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${APP_BASE_URL}/api/v1
        VITE_AGENT_STREAM_URL: wss://${APP_HOST}/api/v1/events/stream
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    restart: unless-stopped
    networks: [internal]
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    user: "1001:1001"

  backend:
    image: ${BACKEND_IMAGE:-personal-os-backend}:${IMAGE_TAG:-prod}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [internal]
    env_file:
      - ${ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./logs/backend:/app/logs
      - backup_data:/app/backups:ro
    security_opt:
      - no-new-privileges:true
    user: "1001:1001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker-critical:
    image: ${BACKEND_IMAGE:-personal-os-backend}:${IMAGE_TAG:-prod}
    restart: unless-stopped
    networks: [internal]
    env_file:
      - ${ENV_FILE:-.env.production}
    command: celery -A app.tasks.celery_app worker -Q critical -c 2 -n critical@%h
    volumes:
      - backup_data:/app/backups
      - ./secrets/backup_private_key.txt:/run/secrets/backup_private_key:ro
      # Docker socket removed: backup restore drills should use docker-socket-proxy or
      # a separate restore job triggered via celery task with pre-pulled image.
      # If docker socket is needed, use docker-socket-proxy instead of mounting directly.
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    # Fixed: was running as root (0:0). Removed docker socket dependency.
    user: "1001:1001"

  worker-default:
    image: ${BACKEND_IMAGE:-personal-os-backend}:${IMAGE_TAG:-prod}
    restart: unless-stopped
    networks: [internal]
    env_file:
      - ${ENV_FILE:-.env.production}
    command: celery -A app.tasks.celery_app worker -Q default -c 4 -n default@%h
    volumes:
      - backup_data:/app/backups
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    user: "1001:1001"

  worker-background:
    image: ${BACKEND_IMAGE:-personal-os-backend}:${IMAGE_TAG:-prod}
    restart: unless-stopped
    networks: [internal]
    env_file:
      - ${ENV_FILE:-.env.production}
    command: celery -A app.tasks.celery_app worker -Q background -c 2 -n background@%h
    volumes:
      - backup_data:/app/backups
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    user: "1001:1001"

  beat:
    image: ${BACKEND_IMAGE:-personal-os-backend}:${IMAGE_TAG:-prod}
    restart: unless-stopped
    networks: [internal]
    env_file:
      - ${ENV_FILE:-.env.production}
    command: python -m app.tasks.beat_launcher
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    user: "1001:1001"

  postgres:
    image: postgres:16.3-alpine
    restart: unless-stopped
    networks: [internal]
    env_file:
      - ${ENV_FILE:-.env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-personal_os} -d ${POSTGRES_DB:-personal_os}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    networks: [internal]
    env_file:
      - ${ENV_FILE:-.env.production}
    command: >
      sh -c 'redis-server --appendonly yes --appendfsync everysec
      --maxmemory 256mb --maxmemory-policy allkeys-lru
      --requirepass "$${REDIS_PASSWORD:?REDIS_PASSWORD is required}"'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    networks: [internal]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alerts:/etc/prometheus/alerts:ro
      - ./deploy/monitoring/slos.yml:/etc/prometheus/slos.yml:ro
      - prometheus_data:/prometheus

  alertmanager:
    image: prom/alertmanager:v0.28.0
    restart: unless-stopped
    networks: [internal]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./deploy/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./secrets/alertmanager_webhook_token.txt:/etc/alertmanager/secrets/webhook_token:ro

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    networks: [internal]
    environment:
      # Set GRAFANA_ADMIN_USER and GRAFANA_ADMIN_PASSWORD in .env.production
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env.production}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  loki:
    image: grafana/loki:3.2.1
    restart: unless-stopped
    networks: [internal]
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./deploy/monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.2.1
    restart: unless-stopped
    networks: [internal]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./deploy/monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/personal-os:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    networks: [internal]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    networks: [internal]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    networks: [internal]
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    restart: unless-stopped
    networks: [internal]
    env_file:
      - ${ENV_FILE:-.env.production}
    entrypoint: ["/bin/sh", "-c"]
    command: 'exec /redis_exporter --redis.addr=redis://redis:6379 --redis.password="$${REDIS_PASSWORD}"'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    restart: unless-stopped
    networks: [internal]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/monitoring/otel-collector.yml:/etc/otelcol/config.yaml:ro

  flower:
    image: ${BACKEND_IMAGE:-personal-os-backend}:${IMAGE_TAG:-prod}
    restart: unless-stopped
    networks: [internal]
    env_file:
      - ${ENV_FILE:-.env.production}
    command: celery -A app.tasks.celery_app flower --port=5555 --basic_auth=${FLOWER_BASIC_AUTH:?FLOWER_BASIC_AUTH must be set in .env.production}
    security_opt:
      - no-new-privileges:true
    user: "1001:1001"
