global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/tsm_alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "graxia-api"
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ["graxia-api:8000"]
    metrics_path: /metrics

  - job_name: "graxia-signal"
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ["graxia-signal:8752"]
    metrics_path: /api/health

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "tsm-paper-bot"
    static_configs:
      - targets: ["host.docker.internal:9090"]
        labels:
          portfolio: "tsm"
