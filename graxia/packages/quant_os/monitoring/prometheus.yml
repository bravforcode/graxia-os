global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "graxia-api"
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ["graxia-api:8000"]
    metrics_path: /metrics

  - job_name: "graxia-signal"
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ["graxia-signal:8752"]
    metrics_path: /api/health

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
