# MT5 Connection Configuration
# Copy to mt5_connector/config.yaml and use the MT5 terminal session you are already logged into.
# Do not store login, password, or server here.

mt5:
  # Path to MT5 terminal64.exe (leave empty for default)
  path: ""
  
  # Connection timeout (milliseconds)
  timeout: 10000
  
  # Allowed symbols
  symbols:
    - XAUUSD
  
  # Timeframe for bar data (MT5 constant)
  # 1=M1, 5=M5, 15=M15, 30=M30, 60=H1, 240=H4, 1440=D1
  timeframe: 60  # H1

# Demo canary settings
canary:
  execution_enabled: false  # Set to true only after Phase 8 approval
  account_mode: DEMO
  max_open_positions: 1
  max_orders_per_day: 3
