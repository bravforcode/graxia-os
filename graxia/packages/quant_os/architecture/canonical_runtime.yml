# ═══════════════════════════════════════════════════════════════════
# AMBIGUITIES
# ═══════════════════════════════════════════════════════════════════

ambiguities:

  - id: "config_legacy_sizing_fields"
    files: ["core/config.py"]
    description: "core/config.py has max_risk_per_trade_pct and similar fields that feed into risk_policy.py. These are config values, not the sizing algorithm itself. position_sizer.py (LEGACY) imports from config; position_sizer_v2.py (CANONICAL) does not."
    resolution: "config.py is ACTIVE (it's the config source). position_sizer.py is LEGACY."

  - id: "execution_order_vs_state_machine"
    files: ["execution/order.py", "execution/order_state_machine.py"]
    description: "order.py contains an older Order class with inline state transitions. order_state_machine.py is the canonical 16-state machine. order.py is still imported by broker_adapter.py and manager.py."
    resolution: "order.py remains ACTIVE because it's wired into the runtime path. order_state_machine.py is the canonical state definition. Consider deprecating order.py's inline state in favor of the state machine."

  - id: "gold_bot_strategy_base_vs_canonical"
    files: ["gold_bot/strategies/base.py", "strategies/base.py"]
    description: "gold_bot has its own GoldStrategy ABC. strategies/base.py is the canonical Strategy ABC used by mtm/mrb/mlb/ensemble."
    resolution: "Both ACTIVE. gold_bot strategies extend GoldStrategy (gold_bot-specific); canonical strategies extend Strategy (strategies/base.py). Different lineages."

  - id: "data_loader_vs_feed"
    files: ["backtest/data_loader.py", "data/feed.py"]
    description: "backtest/data_loader.py loads CSV files for backtests. data/feed.py is the live data feed with MT5/Yahoo/fallback."
    resolution: "Both ACTIVE. data_loader is backtest-specific; feed is live/paper. Different contexts."

  - id: "risk_engine_vs_pre_trade_risk"
    files: ["risk/engine.py", "risk/pre_trade_risk.py"]
    description: "risk/engine.py has 17 pre-trade checks (older). risk/pre_trade_risk.py is the newer, simpler pre-trade check."
    resolution: "pre_trade_risk.py is CANONICAL. risk/engine.py is LEGACY_READ_ONLY."

  - id: "engine_legacy_fill_path"
    files: ["backtest/engine.py"]
    description: "Engine uses inline sizing and close-price fills. Does not call position_sizer_v2, fill_model, cost_model, order_state_machine, or trade_ledger. Phase 3.1 scope."
    resolution: "Phase 3.1 will wire all execution components. Until then, engine is LEGACY_CLOSE_PRICE."
