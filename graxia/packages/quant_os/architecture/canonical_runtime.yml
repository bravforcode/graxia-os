# Canonical Runtime Map — Quant OS
# Generated: G0.1
# Rule: Each responsibility has EXACTLY ONE canonical module.

meta:
  version: "1.0"
  generated: "2026-06-22"
  rule: "One canonical module per responsibility. Non-canonical modules get status labels."

# ═══════════════════════════════════════════════════════════════════
# CANONICAL RESPONSIBILITY → MODULE MAPPING
# ═══════════════════════════════════════════════════════════════════

responsibilities:

  mtf_slicing:
    canonical: "backtest/mtf_cursor.py"
    prohibited:
      - "core/multi_source_pipeline.py"  # different concern (data ingestion, not MTF slicing)
    notes: "MultiTimeframeCursor provides point-in-time MTF data slicing for backtests."

  dataset_validation:
    canonical: "data/manifests/ + data/pipeline.py"
    prohibited: []
    notes: "Manifests define expected data shape; pipeline handles ingestion/validation."

  symbol_contract_lookup:
    canonical: "broker/mt5_gateway.py + broker/contract_spec.py"
    prohibited: []
    notes: "MT5 gateway fetches live contract specs; ContractSpec is the immutable data class."

  risk_policy:
    canonical: "risk/risk_policy.py"
    prohibited:
      - "core/golden_rules.py"  # hard limits, not risk policy
    notes: "RiskPolicy dataclass holds soft risk limits (per-trade, daily, weekly, drawdown)."

  position_sizing:
    canonical: "risk/position_sizer_v2.py"
    prohibited:
      - "risk/position_sizer.py"  # LEGACY — old sizer with hardcoded methods
    notes: "v2 uses decoupled ContractSpec + RiskPolicy, no direct imports."

  pre_trade_checks:
    canonical: "risk/pre_trade_risk.py"
    prohibited:
      - "risk/engine.py"  # LEGACY_READ_ONLY — 17-check engine, superseded by pre_trade_risk
    notes: "Checks sizing_result against risk_ledger and kill_switch before order submission."

  backtest_execution:
    canonical: "backtest/engine.py"
    prohibited: []
    notes: "BacktestEngine with MTF cursor integration, signal execution, equity tracking. CURRENTLY USES LEGACY_CLOSE_PRICE path — inline sizing, close-price fills, no bid/ask, no cost model, no ledger. Phase 3.1 will wire to ConservativeBarFillModel + CostModel + TradeLedger + OrderStateMachine."

  cost_model:
    canonical: "execution/cost_model.py"
    prohibited: []
    notes: "TradeCosts calculation with spread, commission, slippage scenarios."

  fill_model:
    canonical: "execution/fill_model.py"
    prohibited: []
    notes: "Simulates entry/exit fills with slippage, SL/TP trigger checks."

  trade_ledger:
    canonical: "execution/trade_ledger.py"
    prohibited:
      - "core/structured_trades.py"  # LEGACY_READ_ONLY — vectorbt-pattern trade storage
    notes: "JSON-file trade records with full provenance and hash integrity."

  order_state_machine:
    canonical: "execution/order_state_machine.py"
    prohibited:
      - "execution/order.py"  # LEGACY_READ_ONLY — older Order class with inline state
    notes: "16-state machine with enforced transitions, no MT5 dependency."

  conservative_bar_model:
    canonical: "execution/conservative_bar_model.py"
    prohibited: []
    notes: "Bar high/low → synthetic bid/ask when tick data unavailable."

  kill_switch:
    canonical: "risk/kill_switch.py"
    prohibited: []
    notes: "Persistent JSON-file kill switch. Blocks all new orders when active."

  risk_ledger:
    canonical: "risk/risk_ledger.py"
    prohibited: []
    notes: "JSON-file daily/weekly risk tracking. Resets at start of trading day."

  external_repo_registry:
    canonical: "repo_intelligence/registry/"
    prohibited: []
    notes: "YAML registry of external repo references, quarantine decisions, canonical mappings."

  contract_snapshot_store:
    canonical: "broker/contract_snapshot_store.py"
    prohibited: []
    notes: "Immutable JSON-file store for ContractSpec snapshots with hash verification."

  strategy_definition:
    canonical: "strategies/base.py"
    prohibited:
      - "gold_bot/strategies/base.py"  # gold_bot-specific, not the canonical base
    notes: "Signal dataclass and Strategy ABC. All canonical strategies extend this."

  data_loading:
    canonical: "data/feed.py"
    prohibited:
      - "backtest/data_loader.py"  # backtest-specific CSV loader, subset of feed
    notes: "Live data feed with MT5, Yahoo Finance, fallback chain."

  quality_gate:
    canonical: "data/quality_gate.py"
    prohibited: []
    notes: "Validates data before trading decisions. Checks freshness, gaps, consistency."

