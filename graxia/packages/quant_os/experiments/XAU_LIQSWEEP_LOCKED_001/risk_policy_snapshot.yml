risk_policy:
  policy_id: DEFAULT_V1
  symbol: XAUUSD
  asset_class: FX_METALS

  position_sizing:
    method: fixed_risk_pct
    max_risk_per_trade_pct: 1.0
    min_position_lots: 0.01
    max_position_lots: 1.0
    units_per_lot: 100

  daily_limits:
    max_daily_loss_pct: 3.0
    max_positions: 3

  drawdown:
    max_drawdown_pct: 10.0

  breakeven:
    enabled: true
    trigger_pips: 50.0
    trailing_stop_pips: 100.0

  execution:
    min_score_to_trade: 300
    min_active_strategies: 3
    ai_validation_enabled: true
    ai_min_confidence: 0.6
    cycle_interval_seconds: 30

  strategy_overrides:
    liquidity_sweep:
      weight: 1.3
      note: "Highest-weighted strategy in ensemble"
