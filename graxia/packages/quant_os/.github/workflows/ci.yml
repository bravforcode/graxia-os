name: Quant OS CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio ruff
          pip install -e .

      - name: Lint with ruff
        run: ruff check . --output-format=github

      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/chaos \
            --ignore=tests/test_backtest_refactor_b1_b3_c4.py \
            --ignore=tests/test_backtesting_py_oracle.py \
            --ignore=tests/test_backtrader_oracle.py \
            --ignore=tests/test_hftbacktest_isolation.py \
            --ignore=tests/test_vectorbt_oracle.py

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run parity check
        run: python scripts/parity_check.py

  production-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run production readiness check
        run: python -c "
          from core.production_readiness import ProductionReadiness
          pr = ProductionReadiness()
          results = pr.check()
          failed = [r for r in results if not r.passed and r.critical]
          if failed:
              for f in failed:
                  print(f'FAIL: {f.name} - {f.detail}')
              exit(1)
          print('All checks passed')
          "
