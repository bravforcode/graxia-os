name: Quant OS CI

on:
  push:
    branches: [main, staging]
    paths:
      - "graxia/packages/quant_os/**"
  schedule:
    - cron: "0 3 * * *"  # nightly at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Secret scan
        run: |
          pip install detect-secrets
          detect-secrets scan graxia/packages/quant_os/ \
            --exclude-files '\.pyc$' \
            --exclude-files '__pycache__' \
            --exclude-files '\.json$' \
            | python -c "import sys,json; d=json.load(sys.stdin); exits=0; [print(f'LEAK: {f}') for f,v in d.get('results',{}).items() for _ in v]; sys.exit(1 if d.get('results') else 0)"

  full-tests:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt || true

      - name: Run full test suite
        run: |
          python -m pytest graxia/packages/quant_os/tests/ \
            --tb=short -q \
            --ignore=graxia/packages/quant_os/tests/test_vwap.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/
