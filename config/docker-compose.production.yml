version: "3.8"

services:
  # PostgreSQL Database
  # NOTE: Ports not exposed to host — backend/celery access via Docker internal DNS
  postgres:
    image: postgres:15-alpine
    env_file: ../.env.production
    environment:
      POSTGRES_USER: graxia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-graxia_secure_password}
      POSTGRES_DB: graxia_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Security: No host port exposure — accessed via internal Docker network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graxia"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  # NOTE: Ports not exposed to host — backend/celery access via Docker internal DNS
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Security: No host port exposure — accessed via internal Docker network
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ../.env.production
    environment:
      - ENVIRONMENT=production
      - APP_ENV=production
      - RUNNING_IN_DOCKER=true
      - DATABASE_URL=postgresql://graxia:${DB_PASSWORD:-graxia_secure_password}@postgres:5432/graxia_production
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL:-Graxia <hello@graxia.io>}
      - FRONTEND_URL=${FRONTEND_URL:-https://app.graxia.io}
      - SENTRY_DSN=${SENTRY_DSN}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # Frontend (built static files served by Caddy)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_build:/app/dist
    depends_on:
      - backend
    restart: "no"

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ../.env.production
    environment:
      - ENVIRONMENT=production
      - APP_ENV=production
      - RUNNING_IN_DOCKER=true
      - DATABASE_URL=postgresql://graxia:${DB_PASSWORD:-graxia_secure_password}@postgres:5432/graxia_production
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ../.env.production
    environment:
      - ENVIRONMENT=production
      - APP_ENV=production
      - RUNNING_IN_DOCKER=true
      - DATABASE_URL=postgresql://graxia:${DB_PASSWORD:-graxia_secure_password}@postgres:5432/graxia_production
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  frontend_build:
