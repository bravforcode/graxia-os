# Redis Configuration File
# Generated for Graxia Intelligence OS
# Last Updated: 2026-05-07

# Network
bind 0.0.0.0
port 6379
protected-mode yes

# Security
# IMPORTANT: Set REDIS_PASSWORD in the environment before starting Redis.
# Redis config files do NOT support environment variable substitution.
# The password below is a placeholder — replace it with your actual password,
# or use the entrypoint script to generate this file from the environment variable.
# See docker-compose.yml for how REDIS_PASSWORD is injected at container start.
requirepass CHANGE_ME_SET_BY_ENTRYPOINT

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Replication
replica-read-only yes

# Limits
maxmemory 256mb
maxmemory-policy allkeys-lru
maxclients 10000

# Append Only File
appendonly no
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Slow Log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency Monitor
latency-monitor-threshold 100

# Event Notification
notify-keyspace-events ""

# Advanced Config
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

# TLS/SSL (disabled by default)
# tls-port 6380
# tls-cert-file /path/to/redis.crt
# tls-key-file /path/to/redis.key
# tls-ca-cert-file /path/to/ca.crt

# Logging
loglevel notice
logfile ""
syslog-enabled no

# Databases
databases 16

# Timeout
timeout 0
tcp-keepalive 300
tcp-backlog 511

# Memory Management
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no
lazyfree-lazy-user-del no

# Threaded I/O
io-threads 4
io-threads-do-reads no

# Tracking
tracking-table-max-keys 1000000

# ACL (Access Control List)
# aclfile /etc/redis/users.acl

# Modules
# loadmodule /path/to/module.so

# Cluster (disabled by default)
# cluster-enabled no
# cluster-config-file nodes.conf
# cluster-node-timeout 15000

# Sentinel (disabled by default)
# sentinel monitor mymaster 127.0.0.1 6379 2
# sentinel down-after-milliseconds mymaster 30000
# sentinel parallel-syncs mymaster 1
# sentinel failover-timeout mymaster 180000

# End of Configuration
