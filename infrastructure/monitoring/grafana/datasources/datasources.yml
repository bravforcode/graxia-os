# ═══════════════════════════════════════════════════════════════════════════════
# Grafana Datasources Configuration
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: 1

datasources:
  # ── Prometheus ──
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "5s"
      httpMethod: POST
      manageAlerts: true
      alertmanagerUid: alertmanager
      prometheusType: Prometheus
      cacheLevel: 'High'
      incrementalQuerying: true
      incrementalQueryOverlapWindow: 10m

  # ── ClickHouse ──
  - name: ClickHouse
    type: vertamedia-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    editable: true
    jsonData:
      server: clickhouse
      port: 8123
      username: graxia
      tlsSkipVerify: true

  # ── Elasticsearch ──
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    editable: true
    jsonData:
      timeField: "@timestamp"
      esVersion: "8.0.0"
      maxConcurrentShardRequests: 5
      logMessageField: message
      logLevelField: fields.level
      includeFrozen: false

  # ── Loki (Logs) ──
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: "TraceID"
          matcherRegex: "trace_id=(\\w+)"
          url: "$${__value.raw}"
          datasourceUid: jaeger

  # ── Jaeger (Tracing) ──
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    uid: jaeger
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        tags: ['pod', 'namespace']
        mappedTags: [{ key: 'service.name', value: 'service' }]
        mapTagNamesEnabled: false
        spanStartTimeShift: 1h
        spanEndTimeShift: 1h
        filterByTraceID: true
        filterBySpanID: false

  # ── Redis Data Source ──
  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis://redis-node-1:6379
    editable: true
    jsonData:
      client: cluster
      poolSize: 5
      timeout: 10
      pingInterval: 0
      pipelineWindow: 0

  # ── AlertManager ──
  - name: AlertManager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: true
    uid: alertmanager
    jsonData:
      implementation: prometheus
