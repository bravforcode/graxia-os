[pytest]
pythonpath = backend
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
timeout = 60
timeout_method = thread
addopts =
    --tb=short
    --disable-warnings
    -ra
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
