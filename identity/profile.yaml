goals:
  north_star: >
    Within 6 months: earn consistent freelance income of 30,000+ THB/month,
    place in at least one national or ASEAN-level hackathon or startup competition,
    and ship a live product under Testlyn or Plexta with real active users.
    All three matter — they reinforce each other.
  short_term_3mo: >
    Close 2-3 paying freelance clients in startup, e-commerce, or healthtech.
    Submit Testlyn or Plexta to at least one competition.
    Have one live product with users who return weekly.
  medium_term_1yr: >
    Grow one of Testlyn or Plexta to product-market fit with paying users.
    Win or place in a regional competition (ASEAN or global).
    Raise freelance rate to 700-800 THB/h backed by real case studies.
  long_star: >
    Build a profitable software company out of Thailand — starting from Testlyn
    and Plexta — that solves real operational problems for businesses and
    healthcare systems across Southeast Asia using AI and intelligent automation.

